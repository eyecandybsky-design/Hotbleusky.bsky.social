name: HotBleuskyBot

on:
  schedule:
    - cron: "21 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      BSKY_USERNAME: ${{ secrets.BSKY_USERNAME_HOTBLEUSKY }}
      BSKY_PASSWORD: ${{ secrets.BSKY_PASSWORD_HOTBLEUSKY }}
      STATE_FILE: state_hotbleusky.json

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: |
          python -m pip install --upgrade pip
          pip install atproto

      - run: python hotbleusky_reposter.py

      - name: Save state
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add state_hotbleusky.json

          if git diff --cached --quiet; then
            exit 0
          fi

          git commit -m "Update state"

          git pull --rebase origin main
          git push